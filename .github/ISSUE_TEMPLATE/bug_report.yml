name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: SQL Lens version
      description: Output of `sqllens version`
    validations:
      required: true
  - type: input
    id: client
    attributes:
      label: MCP client
      description: e.g. Cursor 0.42, Claude Desktop, MCP Inspector 0.21
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: sqllens.toml (secrets redacted)
      render: toml
  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      render: shell
