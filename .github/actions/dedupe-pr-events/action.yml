name: 'Deduplicate pull_request / pull_request_target events'
description: |
  When both `pull_request` and `pull_request_target` are wired for the same
  event types, every action fires twice — once on each variant. This action
  routes bot mergers to `pull_request_target` only and human mergers to
  `pull_request` only, so downstream steps run exactly once per real event.

  Scope: this action ONLY decides "is this the canonical event variant for
  the actor?". It does NOT enforce an actor allowlist — `should_run=true`
  for ANY actor whose login ends in `[bot]` on `pull_request_target`, which
  includes `dependabot[bot]`, `github-actions[bot]`, etc. Callers that want
  to restrict to a specific bot (or to humans) MUST add their own
  allowlist gate after consulting this output.

outputs:
  should_run:
    description: |
      "true" if this event is the canonical variant for the actor (run downstream
      steps); "false" otherwise. Caller is responsible for any actor allowlist —
      this output is NOT an authorization signal on its own.
    value: ${{ steps.check.outputs.should_run }}

runs:
  using: composite
  steps:
    - id: check
      shell: bash
      env:
        ACTOR: ${{ github.actor }}
        EVENT_NAME: ${{ github.event_name }}
      run: |
        set -euo pipefail
        is_bot=false
        [[ "$ACTOR" == *"[bot]" ]] && is_bot=true
        if { [ "$is_bot" = "true" ] && [ "$EVENT_NAME" = "pull_request_target" ]; } \
        || { [ "$is_bot" = "false" ] && [ "$EVENT_NAME" = "pull_request" ]; }; then
          echo "should_run=true"  >> "$GITHUB_OUTPUT"
        else
          echo "should_run=false" >> "$GITHUB_OUTPUT"
        fi
