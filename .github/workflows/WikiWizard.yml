name: WikiWizard

on:
  pull_request:
    types: [opened, ready_for_review, synchronize, labeled, unlabeled]

concurrency:
  group: claude-docs-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.extract.outputs.enabled }}
      project_number: ${{ steps.extract.outputs.project_number }}
      claude_model: ${{ steps.extract.outputs.claude_model }}
      wikiwizard_claude_model: ${{ steps.extract.outputs.wikiwizard_claude_model }}
      docs_internal: ${{ steps.extract.outputs.docs_internal }}
      docs_external: ${{ steps.extract.outputs.docs_external }}
      documented_label: ${{ steps.extract.outputs.documented_label }}
      release_notes_file: ${{ steps.extract.outputs.release_notes_file }}
      bot_login: ${{ steps.extract.outputs.bot_login }}
      allowed_bots: ${{ steps.extract.outputs.allowed_bots }}
      effort: ${{ steps.extract.outputs.effort }}
    steps:
      - uses: actions/checkout@v6
      - id: cfg
        uses: ./.github/actions/read-project-config
      - id: extract
        env:
          CONFIG_JSON: ${{ steps.cfg.outputs.json }}
        run: |
          set -euo pipefail
          {
            echo "enabled=$(echo "$CONFIG_JSON" | jq -r '.workflows.WikiWizard // false')"
            echo "project_number=$(echo "$CONFIG_JSON" | jq -r '.project_number')"
            echo "claude_model=$(echo "$CONFIG_JSON" | jq -r '.claude_model')"
            echo "wikiwizard_claude_model=$(echo "$CONFIG_JSON" | jq -r '.wikiwizard.claude_model')"
            echo "docs_internal=$(echo "$CONFIG_JSON" | jq -r '.docs.internal')"
            echo "docs_external=$(echo "$CONFIG_JSON" | jq -r '.docs.external')"
            echo "documented_label=$(echo "$CONFIG_JSON" | jq -r '.wikiwizard.documented_label')"
            echo "release_notes_file=$(echo "$CONFIG_JSON" | jq -r '.wikiwizard.release_notes_file')"
            echo "bot_login=$(echo "$CONFIG_JSON" | jq -r '.bot_login')"
            echo "allowed_bots=$(echo "$CONFIG_JSON" | jq -r '.wikiwizard.allowed_bots')"
            echo "effort=$(echo "$CONFIG_JSON" | jq -r '.wikiwizard.effort // "medium"')"
          } >> "$GITHUB_OUTPUT"

  documentation:
    needs: config
    # Run when "Documented" label is not yet present, PR is not in draft mode,
    # and PR is not auto-generated by the devflow-audit-claude plugin.
    # devflow/* branches are owned by that plugin and should not trigger docs.
    if: >-
      needs.config.outputs.enabled == 'true' &&
      !contains(github.event.pull_request.labels.*.name, needs.config.outputs.documented_label) &&
      github.event.pull_request.draft == false &&
      !startsWith(github.event.pull_request.head.ref, 'devflow/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          # 50 covers any realistic PR commit range; the docs-sync skills
          # only need the PR diff + working tree, not full history.
          fetch-depth: 50
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Internal Documentation Review
        id: claude-internal
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: ${{ needs.config.outputs.allowed_bots }}
          prompt: |
            Read and follow the skill instructions in .claude/plugins/devflow/skills/docs-sync-internal/SKILL.md exactly.
            The internal documentation path is ${{ needs.config.outputs.docs_internal }}.
            Do not commit — the workflow handles commits.
          # `acceptEdits` ("auto" mode): file edits inside $GITHUB_WORKSPACE are
          # auto-accepted; writes outside are denied; Bash still gated below.
          # Required because prompt-mode does not auto-set this (only tag-mode
          # does). Without it, the headless SDK denies any tool falling through
          # to "ask" — Edit/Write get silently rejected even when listed in
          # --allowed-tools.
          claude_args: >-
            --model ${{ needs.config.outputs.wikiwizard_claude_model }}
            ${{ needs.config.outputs.effort != 'medium' && format('--effort {0}', needs.config.outputs.effort) || '' }}
            --permission-mode acceptEdits
            --allowed-tools
            "Read,
            Edit,
            Write,
            Glob,
            Grep,
            LS,
            Bash(git status:*),
            Bash(git diff:*),
            Bash(git log:*),
            Bash(git show:*),
            Bash(git ls-files:*),
            Bash(gh pr comment:*),
            Bash(gh pr diff:*),
            Bash(gh pr view:*),
            Bash(gh pr review:*),
            Bash(ls:*),
            Bash(find:*),
            Bash(cat:*),
            Bash(head:*),
            Bash(tail:*),
            Bash(grep:*),
            Bash(rg:*),
            Bash(wc:*),
            Bash(date:*),
            Bash(mkdir:*)"

      - name: Run External Documentation Review
        id: claude-external
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: ${{ needs.config.outputs.allowed_bots }}
          prompt: |
            Read and follow the skill instructions in .claude/plugins/devflow/skills/docs-sync-external/SKILL.md exactly.
            The internal documentation path is ${{ needs.config.outputs.docs_internal }}.
            The external documentation path is ${{ needs.config.outputs.docs_external }}.
            Do not commit — the workflow handles commits.
          # See Internal Documentation Review step above for why
          # --permission-mode acceptEdits is needed.
          claude_args: >-
            --model ${{ needs.config.outputs.wikiwizard_claude_model }}
            ${{ needs.config.outputs.effort != 'medium' && format('--effort {0}', needs.config.outputs.effort) || '' }}
            --permission-mode acceptEdits
            --allowed-tools
            "Read,
            Edit,
            Write,
            Glob,
            Grep,
            LS,
            Bash(git status:*),
            Bash(git diff:*),
            Bash(git log:*),
            Bash(git show:*),
            Bash(git ls-files:*),
            Bash(gh pr comment:*),
            Bash(gh pr diff:*),
            Bash(gh pr view:*),
            Bash(gh pr review:*),
            Bash(ls:*),
            Bash(find:*),
            Bash(cat:*),
            Bash(head:*),
            Bash(tail:*),
            Bash(grep:*),
            Bash(rg:*),
            Bash(wc:*),
            Bash(date:*),
            Bash(mkdir:*)"

      - name: Run Release Notes Review
        id: claude-release-notes
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: ${{ needs.config.outputs.allowed_bots }}
          prompt: |
            Read and follow the skill instructions in .claude/plugins/devflow/skills/docs-release-notes/SKILL.md exactly.
            The internal documentation path is ${{ needs.config.outputs.docs_internal }}.
            The external documentation path is ${{ needs.config.outputs.docs_external }}.
            The release notes file is ${{ needs.config.outputs.release_notes_file }}.
            The PR number is ${{ github.event.pull_request.number }}.
            Do not commit — the workflow handles commits.
          # See Internal Documentation Review step above for why
          # --permission-mode acceptEdits is needed.
          claude_args: >-
            --model ${{ needs.config.outputs.wikiwizard_claude_model }}
            ${{ needs.config.outputs.effort != 'medium' && format('--effort {0}', needs.config.outputs.effort) || '' }}
            --permission-mode acceptEdits
            --allowed-tools
            "Read,
            Edit,
            Write,
            Glob,
            Grep,
            LS,
            Bash(git status:*),
            Bash(git diff:*),
            Bash(git log:*),
            Bash(git show:*),
            Bash(gh pr view:*),
            Bash(ls:*),
            Bash(find:*),
            Bash(cat:*),
            Bash(head:*),
            Bash(tail:*),
            Bash(grep:*),
            Bash(rg:*),
            Bash(wc:*),
            Bash(date:*)"

      - name: Commit and push all documentation changes
        run: |
          DOCS_INTERNAL="${{ needs.config.outputs.docs_internal }}"
          DOCS_EXTERNAL="${{ needs.config.outputs.docs_external }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          # Remove any non-markdown files Claude may have created as scratch tools
          find "${DOCS_INTERNAL}" "${DOCS_EXTERNAL}" -type f ! -name '*.md' -delete 2>/dev/null || true
          git add "${DOCS_INTERNAL}*.md" "${DOCS_INTERNAL}**/*.md" || true
          git add "${DOCS_EXTERNAL}*.md" "${DOCS_EXTERNAL}**/*.md" || true
          if git diff --cached --quiet; then
            echo "No documentation changes to commit"
          else
            git commit -m "docs: update documentation [skip ci]"
            git push origin "HEAD:refs/heads/${{ github.event.pull_request.head.ref }}"
          fi

      - name: Add Documented Label
        if: success()
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['${{ needs.config.outputs.documented_label }}']
            });

  request-claude-review:
    needs: [config, documentation]
    # Only run if bot_login is configured and PR is not from the devflow-audit-claude plugin
    if: >-
      needs.config.outputs.enabled == 'true' &&
      needs.config.outputs.bot_login != '' &&
      !startsWith(github.event.pull_request.head.ref, 'devflow/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      # Required so path-based composite action references resolve.
      - uses: actions/checkout@v6

      - name: Generate app token
        id: app-token
        uses: ./.github/actions/get-app-token
        with:
          app-id: ${{ secrets.RADMAN_AI_APP_ID }}
          private-key: ${{ secrets.RADMAN_AI_PRIVATE_KEY }}

      - name: Post review comment
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          ORG="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"

          echo "💬 Posting review request on PR #$PR_NUMBER..."
          gh pr comment "$PR_NUMBER" \
            --repo "$ORG/$REPO_NAME" \
            --body "@claude run /devflow:review"
          echo "✅ Review comment posted on PR #$PR_NUMBER"

          echo "## ✅ Claude Review Requested" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**PR:** [#${PR_NUMBER}](https://github.com/${ORG}/${REPO_NAME}/pull/${PR_NUMBER})" >> "$GITHUB_STEP_SUMMARY"
