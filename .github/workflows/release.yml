name: Release

# Triggered by pushing a semver tag (e.g. ``v0.1.0``). Builds the wheel
# + sdist, publishes to PyPI via Trusted Publishing (no API tokens), and
# attaches the artifacts to the GitHub release. The Docker image build
# lives in docker.yml so failures there don't block the PyPI publish.

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        id: version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pkg=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag v$tag does not match pyproject.toml version $pkg"
            exit 1
          fi
          echo "version=$tag" >> "$GITHUB_OUTPUT"

      - name: Install build tooling
        run: pip install --upgrade build

      - name: Build sdist + wheel
        run: python -m build

      - name: Upload artifacts for downstream jobs
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  pypi-publish:
    name: Publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-latest
    # Trusted Publishing requires id-token: write. Configure the matching
    # publisher on PyPI: project=sqllens, owner=The01Geek, repo=sqllens,
    # workflow=release.yml, environment=pypi.
    environment:
      name: pypi
      url: https://pypi.org/p/sqllens
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  github-release:
    name: Attach artifacts to GitHub release
    needs: [build, pypi-publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Generate release notes from CHANGELOG
        id: notes
        run: |
          version="${{ needs.build.outputs.version }}"
          # Pull the [Unreleased] block as fallback; if there's a versioned
          # section, use that. Best-effort — operators can edit on the GitHub UI.
          if grep -q "^## \[$version\]" CHANGELOG.md; then
            awk -v v="$version" \
              'BEGIN{p=0} \
               /^## \[/{ if($0 ~ "\\["v"\\]") {p=1; next} else if(p) exit } \
               p{print}' CHANGELOG.md > release-notes.md
          else
            awk 'BEGIN{p=0} \
                 /^## \[Unreleased\]/{p=1; next} \
                 /^## \[/{ if(p) exit } \
                 p{print}' CHANGELOG.md > release-notes.md
          fi

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          name: SQL Lens ${{ needs.build.outputs.version }}
          body_path: release-notes.md
          files: |
            dist/*.whl
            dist/*.tar.gz
          draft: false
          prerelease: ${{ contains(needs.build.outputs.version, '-') }}
