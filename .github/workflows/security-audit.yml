name: Weekly Security Audit

# Runs the /security-review Claude Code slash command across the repo every
# Saturday morning, with emphasis on the most recent changes.
#
# Schedule: 15:00 UTC on Saturdays = 7:00 AM PST / 8:00 AM PDT (server TZ is PST).
# Findings are posted as a GitHub issue.
on:
  schedule:
    - cron: '0 15 * * 6'
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'Number of days of recent changes to emphasize (integer 1-90)'
        required: false
        default: '7'

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.extract.outputs.enabled }}
      base_branch: ${{ steps.extract.outputs.base_branch }}
      claude_model: ${{ steps.extract.outputs.claude_model }}
      effort: ${{ steps.extract.outputs.effort }}
    steps:
      - uses: actions/checkout@v6
      - id: cfg
        uses: ./.github/actions/read-project-config
      - id: extract
        env:
          CONFIG_JSON: ${{ steps.cfg.outputs.json }}
        run: |
          set -euo pipefail
          {
            echo "enabled=$(echo "$CONFIG_JSON" | jq -r '.workflows.security_audit // true')"
            echo "base_branch=$(echo "$CONFIG_JSON" | jq -r '.base_branch')"
            echo "claude_model=$(echo "$CONFIG_JSON" | jq -r '.claude_model')"
            echo "effort=$(echo "$CONFIG_JSON" | jq -r '.security_audit.effort // "medium"')"
          } >> "$GITHUB_OUTPUT"

  security-review:
    needs: config
    if: needs.config.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute recent change context
        id: recent
        env:
          RAW_LOOKBACK: ${{ github.event.inputs.lookback_days }}
        run: |
          set -euo pipefail
          # Validate input is an integer in [1, 90]; default to 7 otherwise.
          LOOKBACK_DAYS=7
          if [[ "${RAW_LOOKBACK:-}" =~ ^[0-9]+$ ]] && [ "${RAW_LOOKBACK}" -ge 1 ] && [ "${RAW_LOOKBACK}" -le 90 ]; then
            LOOKBACK_DAYS="${RAW_LOOKBACK}"
          fi
          SINCE_DATE=$(date -u -d "${LOOKBACK_DAYS} days ago" +%Y-%m-%d)
          echo "lookback_days=${LOOKBACK_DAYS}" >> "$GITHUB_OUTPUT"
          echo "since_date=${SINCE_DATE}" >> "$GITHUB_OUTPUT"
          echo "Lookback: ${LOOKBACK_DAYS} days (since ${SINCE_DATE})"

      - name: Run Claude Code security audit
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git

          plugins: |
            pr-review-toolkit@claude-plugins-official
            code-review@claude-plugins-official
            feature-dev@claude-plugins-official
            superpowers@claude-plugins-official
            claude-md-management@claude-plugins-official

          base_branch: ${{ needs.config.outputs.base_branch }}

          prompt: |
            Run `/security-review` on this entire repository.

            **Emphasize the most recently changed files** — commits since
            ${{ steps.recent.outputs.since_date }} (the last ${{ steps.recent.outputs.lookback_days }} days).
            Use `git log --since="${{ steps.recent.outputs.since_date }}" --name-only`
            and `git diff --since="${{ steps.recent.outputs.since_date }}"` to identify
            them, but still skim the broader codebase for systemic issues.

            If the `/security-review` slash command is not installed, perform an
            equivalent audit covering at minimum:
              - OWASP Top 10 (SQL injection, XSS, CSRF, SSRF, IDOR, auth/session
                flaws, deserialization, broken access control, etc.)
              - Command/shell injection in any language-specific subprocess or
                eval surface used by this repo
              - Path traversal in file operations
              - Hardcoded secrets, credentials, or API keys
              - Insecure cryptography or weak hashing
              - Unsafe direct database queries that bypass the project's
                parameterization / ORM layer (per `CLAUDE.md`)
              - Missing input validation/sanitization on HTTP/RPC endpoints
                exposed by this repo
              - Authorization gaps in admin/backend routes
              - Dependency vulnerabilities in any package manifests present

            Apply the architectural/layering rules from `CLAUDE.md` — flag any
            cross-layer call that violates the boundaries declared there.

            **Output**: create a single GitHub issue that is an **actionable
            work ticket**, not an informational report. Title it
            `Weekly Security Audit – <YYYY-MM-DD>`.

            **Single-step creation — critical for downstream automation**:
            Complete ALL analysis before touching `gh`. Then call
            `gh issue create` exactly once with the complete final body.
            Do NOT post any comments on the issue. Do NOT edit, update, or
            append to the issue after creation. Do NOT split content across
            the body and comments — everything goes in the body in one shot.
            GitHub's body limit is 65,536 characters; if you somehow exceed
            that, condense (drop Low severity, tighten language) rather than
            spilling into comments.

            The issue body MUST be structured as concrete action items a
            developer can pick up and execute, not a summary of findings.
            Requirements:
              - Lead with a top-level `## Action Items` checklist of GitHub
                task-list items (`- [ ] ...`), one per fix. Each item is a
                specific, scoped change — e.g. "Parameterize the SQL query in
                `path/to/handler.ext:LINE` (currently concatenates the request
                parameter)". Avoid vague items like "review auth code".
              - Group action items by severity in this order: Critical, High,
                Medium, Low. Skip a severity entirely if it has no items (do
                not include "no issues found" filler).
              - For each action item, immediately under it include a short
                indented block with:
                  - **File**: `path/to/file.ext:LINE`
                  - **Risk**: one sentence on the concrete attack/impact
                  - **Fix**: the specific change to make (function to call,
                    pattern to apply, code to remove)
                  - **Refs**: commit SHA(s) or PR number(s) from the recent
                    window that introduced or touched the code, if any
              - End with a `## Out of Scope / Notes` section ONLY if there are
                things you deliberately did not action (e.g. third-party
                code, accepted risks). Omit the section otherwise.
              - Do NOT include narrative findings, executive summaries, or
                "what we looked at" sections. Every line should either be an
                action item, its metadata, or out-of-scope notes.
              - If after the audit there are genuinely zero action items at
                any severity, still create the issue but with a single-line
                body: "No action items this week — audit clean as of
                <commit SHA>." Do not pad with reassurance.

            Do NOT add labels when creating the issue (per repo convention)
            and do NOT modify any source files — this is read-only analysis.
            The issue itself is the deliverable.

          # Read-only audit: Edit/Write deliberately not allowed (the issue is
          # the deliverable, not code changes). Bash list broadened with
          # search/inspection utilities so the agent can thoroughly analyze
          # the codebase without hitting silent denials.
          claude_args: >-
            --model ${{ needs.config.outputs.claude_model }}
            ${{ needs.config.outputs.effort != 'medium' && format('--effort {0}', needs.config.outputs.effort) || '' }}
            --allowed-tools
            "Read,
            Glob,
            Grep,
            LS,
            Skill,
            Agent,
            TodoWrite,
            Bash(git log:*),
            Bash(git diff:*),
            Bash(git show:*),
            Bash(git status:*),
            Bash(git blame:*),
            Bash(git rev-list:*),
            Bash(git rev-parse:*),
            Bash(git ls-files:*),
            Bash(git grep:*),
            Bash(gh issue create:*),
            Bash(gh issue view:*),
            Bash(gh issue list:*),
            Bash(gh pr view:*),
            Bash(gh pr diff:*),
            Bash(gh pr list:*),
            Bash(yq:*),
            Bash(jq:*),
            Bash(grep:*),
            Bash(rg:*),
            Bash(find:*),
            Bash(cat:*),
            Bash(head:*),
            Bash(tail:*),
            Bash(wc:*),
            Bash(sort:*),
            Bash(uniq:*),
            Bash(cut:*),
            Bash(awk:*),
            Bash(sed:*),
            Bash(tr:*),
            Bash(xargs:*),
            Bash(ls:*),
            Bash(file:*),
            Bash(stat:*),
            Bash(date:*),
            Bash(diff:*),
            Bash(comm:*),
            Bash(echo:*),
            Bash(printf:*),
            Bash(test:*),
            Bash(pwd:*),
            Bash(realpath:*),
            Bash(dirname:*),
            Bash(basename:*),
            Bash(which:*),
            Bash(env:*)"
