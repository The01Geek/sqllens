name: Docker

# Pushes multi-arch images to GHCR on:
# - tag pushes ``v*`` → tags ``X.Y.Z``, ``X.Y``, ``latest``
# - main branch     → tag ``edge``
# Pull requests build but don't push, so external contributors can't push
# images even if a workflow_dispatch is added later.

on:
  push:
    branches: [main]
    tags: ["v*"]
  # No `pull_request` build: a multi-arch image build on every PR is
  # minutes of Actions time for ~no gating value (this is not a required
  # check; Dockerfile breakage is rare and caught on push:main / tags).

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build + push image
    runs-on: ubuntu-latest
    permissions:
      # write needed because anchore/sbom-action attaches the SPDX file as
      # a release asset on tag pushes. On main / PR runs the read-only scope
      # would suffice, but uniform write avoids surprise tag-only failures.
      contents: write
      packages: write
      id-token: write          # for cosign keyless signing
      attestations: write      # for build provenance attestation

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # OCI image references must be all lowercase. ``github.repository_owner``
      # preserves the user's GitHub case, so we lowercase it here once and use
      # the result for every reference downstream (metadata, build, sign, sbom).
      - name: Compute lowercase image name
        run: echo "IMAGE_NAME=${REPO,,}" >> "$GITHUB_ENV"
        env:
          REPO: ${{ github.repository_owner }}/sqllens

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Semver tags strip the ``v`` prefix; main branch becomes ``edge``;
          # non-tag pushes also get a sha-prefixed tag for traceability.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=edge,enable={{is_default_branch}}
            type=sha,prefix=git-,format=short
          labels: |
            org.opencontainers.image.title=SQL Lens
            org.opencontainers.image.description=Natural-language SQL analytics over MCP.
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build + push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.meta.outputs.tags && fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true

      # Pinned to a commit SHA (not a floating tag) so the cosign binary
      # provenance is verifiable — closing the unverified curl|chmod gap.
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159  # v3.9.2

      - name: Sign image with cosign (keyless)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          # Sign each tag's manifest. ``--yes`` skips the confirmation prompt;
          # signing keys come from the GH Actions OIDC token.
          for tag in $TAGS; do
            cosign sign --yes "${tag}@${DIGEST}"
          done

      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attach build provenance attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
