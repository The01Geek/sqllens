name: Claude Code

# Light @claude-mention listener for non-implementing flows (Q&A,
# /devflow:review, /devflow:pr-description, /security-review, …). The
# heavy /devflow:implement path lives in claude-implement.yml — both
# files share the same toolchain today, but the split lets
# /devflow:implement run under a higher `claude_implement.effort` setting
# (configured in .github/project-config.yml) without inflating every
# @claude mention's cost, and leaves room for future implement-only
# provisioning (e.g. Postgres + MySQL services for connector-level runs)
# without touching the light path.
#
# Mutually-exclusive `if:` conditions on the two workflows guarantee
# exactly one fires per event — see claude-implement.yml.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_review:
    types: [submitted]

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.extract.outputs.enabled }}
      base_branch: ${{ steps.extract.outputs.base_branch }}
      claude_model: ${{ steps.extract.outputs.claude_model }}
      allowed_bots: ${{ steps.extract.outputs.allowed_bots }}
      effort: ${{ steps.extract.outputs.effort }}
    steps:
      - uses: actions/checkout@v6
      - id: cfg
        uses: ./.github/actions/read-project-config
      - id: extract
        env:
          CONFIG_JSON: ${{ steps.cfg.outputs.json }}
        run: |
          set -euo pipefail
          {
            echo "enabled=$(echo "$CONFIG_JSON" | jq -r '.workflows.claude // false')"
            echo "base_branch=$(echo "$CONFIG_JSON" | jq -r '.base_branch')"
            echo "claude_model=$(echo "$CONFIG_JSON" | jq -r '.claude_model')"
            echo "allowed_bots=$(echo "$CONFIG_JSON" | jq -r '.claude.allowed_bots')"
            echo "effort=$(echo "$CONFIG_JSON" | jq -r '.claude.effort // "medium"')"
          } >> "$GITHUB_OUTPUT"

  # Dedupe a MANUAL `@claude run /devflow:review` against the AUTOMATED
  # devflow-review path. Both are independent triggers: a commit
  # push fires devflow-review's `synchronize` re-review, and the
  # human who pushed it typically also comments `@claude run /devflow:review`
  # within a second or two. Without this gate BOTH run a full (billable) LLM
  # review of the same HEAD and post their own status comment — the observed
  # "two comments" bug (PR #113, 15:06:55 synchronize + 15:06:56 comment).
  #
  # Policy ("auto suppresses manual"): if devflow-review is already
  # in-flight for this PR's CURRENT head — either an in_progress `Devflow
  # Review` check on that exact SHA, or a queued/in_progress
  # devflow-review run on the PR's branch (covers the sub-second
  # race before create_check POSTs the check) — skip the manual review and
  # leave a one-line pointer instead. Deliberately fail-OPEN (default
  # suppress=false): a missed suppression just reproduces today's recoverable
  # double-comment, whereas a wrong suppression would silently swallow a
  # review the user explicitly asked for. This is the opposite failure
  # direction from devflow-review's fail-closed gates, by design.
  #
  # Only `/devflow:review` is deduped — NOT `/devflow:review-and-fix` (that
  # auto-applies fixes and has no automated equivalent), and not any other
  # @claude flow (Q&A, pr-description, security-review), which all fall
  # through with suppress=false untouched.
  review_dedupe:
    needs: config
    if: needs.config.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: read
      actions: read
    outputs:
      suppress: ${{ steps.guard.outputs.suppress }}
    steps:
      - id: guard
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BODY: ${{ github.event.comment.body || github.event.review.body || github.event.issue.body }}
          PR: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: |
          set -euo pipefail
          emit() { echo "suppress=$1" >> "$GITHUB_OUTPUT"; }
          emit false  # fail-OPEN default: manual review proceeds unless we prove auto is in-flight

          # First-match-wins: review-and-fix (no automated counterpart, never
          # dedupe) is matched BEFORE the /devflow:review substring it
          # contains; anything else is not a review request.
          case "$BODY" in
            *"/devflow:review-and-fix"*)
              echo "::notice::/devflow:review-and-fix has no auto path; not deduping."
              exit 0 ;;
            *"/devflow:review"*) : ;;
            *)
              echo "::notice::Not a /devflow:review request; nothing to dedupe."
              exit 0 ;;
          esac

          if [ -z "${PR:-}" ] || [ "$PR" = "null" ]; then
            echo "::notice::No PR number on this event; fail-open (manual review proceeds)."
            exit 0
          fi

          HEAD=$(gh pr view "$PR" --repo "$REPO" --json headRefOid --jq .headRefOid 2>/dev/null || echo "")
          BRANCH=$(gh pr view "$PR" --repo "$REPO" --json headRefName --jq .headRefName 2>/dev/null || echo "")
          if [ -z "$HEAD" ] || [ "$HEAD" = "null" ]; then
            echo "::notice::Could not resolve PR #$PR HEAD; fail-open (manual review proceeds)."
            exit 0
          fi

          # Signal 1: an in-flight `Devflow Review` check on THIS exact HEAD.
          # A query failure stays fail-open (IC=0 → not suppressed) but is
          # surfaced as a ::warning:: so a permanently-failing signal is
          # distinguishable from "no auto run existed".
          if RAW_IC=$(gh api --paginate "repos/$REPO/commits/$HEAD/check-runs" \
                 --jq '.check_runs[] | select(.name=="Devflow Review" and (.status=="queued" or .status=="in_progress")) | .id' \
                 2>/dev/null); then
            IC=$(printf '%s' "$RAW_IC" | grep -c . || true)
          else
            echo "::warning::Signal 1 (check-runs) query failed for $HEAD; treating as 0 (fail-open — manual review may proceed)."
            IC=0
          fi
          [[ "$IC" =~ ^[0-9]+$ ]] || IC=0

          # Signal 2: a queued/in_progress devflow-review run on the
          # PR's branch. Covers the <1s synchronize-vs-comment race where the
          # auto run has started but create_check has not POSTed the check yet
          # (an in-flight auto run on the same branch is, by that workflow's
          # own first-ready/synchronize design, reviewing the latest HEAD).
          IR=0
          if [ -n "$BRANCH" ] && [ "$BRANCH" != "null" ]; then
            if ! IR=$(gh run list --repo "$REPO" \
                   --workflow devflow-review.yml \
                   --branch "$BRANCH" \
                   --json status \
                   --jq '[.[] | select(.status=="queued" or .status=="in_progress")] | length' \
                   2>/dev/null); then
              echo "::warning::Signal 2 (run-list) query failed for branch $BRANCH; treating as 0 (fail-open)."
              IR=0
            fi
          fi
          [[ "$IR" =~ ^[0-9]+$ ]] || IR=0

          if [ "$IC" != "0" ] || [ "$IR" != "0" ]; then
            emit true
            NOTE="ℹ️ An automated **Devflow Review** is already running for this commit (\`${HEAD:0:7}\`). Skipping this manual \`/devflow:review\` to avoid a duplicate review and double comments. Use the **Re-run** button on the \`Devflow Review\` check if you need to re-review."
            gh pr comment "$PR" --repo "$REPO" --body "$NOTE" 2>/dev/null || true
            echo "::notice::Suppressed manual /devflow:review for PR #$PR (in-flight check=$IC run=$IR)."
            exit 0
          fi
          echo "::notice::No in-flight auto review for PR #$PR HEAD $HEAD; manual review proceeds."

  claude:
    needs: [config, review_dedupe]
    # Fires on @claude mentions that DO NOT contain `/devflow:implement` —
    # those are claimed by claude-implement.yml, whose conditions are the
    # exact inverse. The `!contains(.../devflow:implement)` clause is
    # repeated per event source because each event surfaces the body under
    # a different path (github.event.comment.body vs github.event.review.body
    # vs github.event.issue.body / .title).
    #
    # PARTITION INVARIANT (read this before adding a new event source): for
    # events that carry the trigger string on a SINGLE field (comment.body,
    # review.body), the light path uses `!contains(field, '/devflow:implement')`
    # and the heavy path uses `contains(field, '/devflow:implement')` — exact
    # complements. For events with MULTIPLE body-bearing fields (the `issues`
    # event has both `.body` and `.title`), the light path must AND-negate
    # `/devflow:implement` across ALL such fields — which is the De Morgan
    # dual of the heavy path's OR-test across the same fields:
    #   light : !contains(body, X) && !contains(title, X)
    #   heavy :  contains(body, X) ||  contains(title, X)
    # Missing one field on the light side will cause BOTH workflows to fire
    # when the trigger appears on that field. If you add a new event source,
    # enumerate every body-bearing field on both sides and apply this transform.
    if: |
      needs.config.outputs.enabled == 'true' &&
      needs.review_dedupe.outputs.suppress != 'true' &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && !contains(github.event.comment.body, '/devflow:implement')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && !contains(github.event.comment.body, '/devflow:implement')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && !contains(github.event.review.body, '/devflow:implement')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) && !contains(github.event.issue.body, '/devflow:implement') && !contains(github.event.issue.title, '/devflow:implement'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # /devflow:review and /devflow:pr-description read the diff via
          # three-dot notation against `origin/main` (`git diff
          # origin/main...HEAD`), which internally computes a merge-base —
          # an ancestor walk on both sides. Depth 50 covers the realistic
          # case (PRs typically ≤ a few dozen commits behind main); long-
          # lived branches that drift past that will error out visibly on
          # the missing merge-base rather than silently produce wrong
          # output. Bump to `fetch-depth: 0` if that becomes a recurring
          # problem.
          fetch-depth: 50

      # Provision the runtime from `.github/project-config.yml`'s `setup`
      # block rather than hardcoding the toolchain (see that file / cloud-setup.md
      # for the rationale). Read the config locally (checkout is done above) so
      # the multi-line install command stays a jq-extracted string we exec
      # directly, never interpolated into a `run:` (injection-safe). Python/Node
      # setup are `uses:` actions — they must be static YAML, so we gate them on
      # a configured version rather than data-looping over them. Mirrors
      # claude-implement.yml — change both together.
      - id: cfg
        uses: ./.github/actions/read-project-config
      - id: setupcfg
        env:
          CONFIG_JSON: ${{ steps.cfg.outputs.json }}
        run: |
          set -euo pipefail
          {
            echo "python_version=$(echo "$CONFIG_JSON" | jq -r '.setup.python_version // ""')"
            echo "node_version=$(echo "$CONFIG_JSON" | jq -r '.setup.node_version // ""')"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.setupcfg.outputs.python_version != ''
        uses: actions/setup-python@v6
        with:
          python-version: ${{ steps.setupcfg.outputs.python_version }}

      - name: Set up Node
        if: steps.setupcfg.outputs.node_version != ''
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.setupcfg.outputs.node_version }}

      # Restore pip's wheel cache when Python is provisioned. setup-python's
      # built-in `cache: pip` is deliberately NOT used: it ERRORS when no
      # requirements/pyproject file exists (the common case for non-package
      # repos). This generic cache degrades to a stable key when no dep file is
      # present, so it never errors and still saves heavy adopters
      # (`pip install -e .[…]`) the repeated PyPI download on every run.
      - name: Cache pip downloads
        if: steps.setupcfg.outputs.python_version != ''
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml', '**/setup.cfg', '**/setup.py') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Provision project dependencies
        env:
          CONFIG_JSON: ${{ steps.cfg.outputs.json }}
        run: |
          set -euo pipefail
          INSTALL=$(echo "$CONFIG_JSON" | jq -r '.setup.install // ""')
          if [ -n "$INSTALL" ]; then
            echo "::group::Installing project dependencies"
            # bash -euo pipefail (not a bare `bash -c`): the outer shell's
            # set -e does NOT propagate into the child, so a multi-line install
            # whose early line fails would otherwise continue and exit green.
            bash -euo pipefail -c "$INSTALL"
            echo "::endgroup::"
          else
            echo "No setup.install configured; skipping dependency install."
          fi

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: ${{ needs.config.outputs.allowed_bots }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Register the official plugin marketplace plus this repo's own
          # local marketplace. `./` resolves to the workflow's checkout root
          # (where .claude-plugin/marketplace.json lives), so PR-branch changes
          # to the marketplace or .claude/plugins/devflow/** are exercised by
          # claude.yml on the PR that introduces them — a git-URL entry would
          # always resolve to main. Local-path marketplaces are supported by
          # claude-code-action since v1.0.28 (we pin @v1, the floating major).
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
            ./

          # Install plugins so skills like /pr-review-toolkit and /devflow:* are available
          plugins: |
            pr-review-toolkit@claude-plugins-official
            code-review@claude-plugins-official
            feature-dev@claude-plugins-official
            superpowers@claude-plugins-official
            claude-md-management@claude-plugins-official
            devflow@devflow-marketplace

          base_branch: ${{ needs.config.outputs.base_branch }}
          claude_args: >-
            --model ${{ needs.config.outputs.claude_model }}
            ${{ needs.config.outputs.effort != 'medium' && format('--effort {0}', needs.config.outputs.effort) || '' }}
            --allowed-tools
            "Read,
            Write,
            Edit,
            Glob,
            Grep,
            LS,
            Skill,
            Agent,
            TodoWrite,
            EnterPlanMode,
            ExitPlanMode,
            WebFetch,
            WebSearch,
            Bash(git add:*),
            Bash(git commit:*),
            Bash(git push:*),
            Bash(git pull:*),
            Bash(git fetch:*),
            Bash(git status:*),
            Bash(git diff:*),
            Bash(git log:*),
            Bash(git show:*),
            Bash(git checkout:*),
            Bash(git branch:*),
            Bash(git stash:*),
            Bash(git rm:*),
            Bash(git mv:*),
            Bash(git restore:*),
            Bash(git revert:*),
            Bash(git blame:*),
            Bash(git ls-files:*),
            Bash(git rev-parse:*),
            Bash(git merge-base:*),
            Bash(gh pr create:*),
            Bash(gh pr edit:*),
            Bash(gh pr comment:*),
            Bash(gh pr diff:*),
            Bash(gh pr view:*),
            Bash(gh pr review:*),
            Bash(gh pr ready:*),
            Bash(gh pr list:*),
            Bash(gh pr checks:*),
            Bash(gh pr status:*),
            Bash(gh pr reopen:*),
            Bash(gh issue view:*),
            Bash(gh issue comment:*),
            Bash(gh issue list:*),
            Bash(gh issue edit:*),
            Bash(gh issue create:*),
            Bash(gh issue reopen:*),
            Bash(gh issue status:*),
            Bash(gh search:*),
            Bash(gh label list:*),
            Bash(gh repo view:*),
            Bash(gh run view:*),
            Bash(gh run list:*),
            Bash(gh workflow view:*),
            Bash(gh workflow list:*),
            Bash(gh api:*),
            Bash(jq:*),
            Bash(.claude/plugins/devflow/scripts/config-get.sh:*),
            Bash(.claude/plugins/devflow/scripts/workpad.py:*),
            Bash(.claude/plugins/devflow/scripts/parse-acs.py:*),
            Bash(.claude/plugins/devflow/scripts/branch-for-issue.py:*),
            Bash(.claude/plugins/devflow/scripts/file-deferrals.py:*),
            Bash(.claude/plugins/devflow/scripts/match-deferrals.py:*),
            Bash(.claude/plugins/devflow/scripts/dismiss-stale-rejections.sh:*),
            Bash(pip install:*),
            Bash(pip:*),
            Bash(python:*),
            Bash(python3:*),
            Bash(python -m:*),
            Bash(python3 -m:*),
            Bash(ruff:*),
            Bash(ruff check:*),
            Bash(ruff format:*),
            Bash(pytest:*),
            Bash(mypy:*),
            Bash(grep:*),
            Bash(rg:*),
            Bash(find:*),
            Bash(wc:*),
            Bash(sort:*),
            Bash(uniq:*),
            Bash(cut:*),
            Bash(tr:*),
            Bash(xargs:*),
            Bash(awk:*),
            Bash(sed:*),
            Bash(diff:*),
            Bash(comm:*),
            Bash(cat:*),
            Bash(head:*),
            Bash(tail:*),
            Bash(less:*),
            Bash(ls:*),
            Bash(tree:*),
            Bash(file:*),
            Bash(stat:*),
            Bash(date:*),
            Bash(pwd:*),
            Bash(realpath:*),
            Bash(dirname:*),
            Bash(basename:*),
            Bash(which:*),
            Bash(type:*),
            Bash(env:*),
            Bash(echo:*),
            Bash(printf:*),
            Bash(test:*),
            Bash(touch:*),
            Bash(mkdir:*),
            Bash(rmdir:*),
            Bash(rm:*),
            Bash(mv:*),
            Bash(cp:*),
            Bash(tee:*)"
          # assignee_trigger: "claude"
          # label_trigger: "claude"

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://docs.claude.com/en/docs/claude-code/sdk#command-line for available options

