# Dependabot config (O-15). Surfaces dependency + GitHub Actions drift
# automatically. Each ecosystem's catch-all group folds its weekly
# updates into one consolidated PR instead of one-PR-per-dependency;
# open-pull-requests-limit only caps any updates that can't be grouped.
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 5
