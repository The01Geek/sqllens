# Dependabot config (O-15). Surfaces dependency + GitHub Actions drift
# automatically. Each ecosystem's catch-all group folds its weekly
# updates into one consolidated PR instead of one-PR-per-dependency, so
# the steady state is a single PR per ecosystem. open-pull-requests-limit
# caps the TOTAL open update PRs for the ecosystem (a grouped PR counts
# against it too); 5 only bites if ungroupable updates — e.g. security
# updates, which Dependabot does not group — also accumulate.
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 5
