<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<!--
  Self-contained MCP App widget for query_database results.

  One widget, three render modes. The host pushes the tool's CallToolResult via
  the MCP Apps postMessage channel; this widget picks its mode from which
  _meta channel is present, in precedence order:
    1. result._meta["sqllens/chart"]  → interactive ECharts chart
    2. result._meta["sqllens/table"]  → sortable/filterable data grid, with the
       executed SQL (result._meta["sqllens/query"].sql) in a collapsible section
    3. neither                        → empty-state notice (the answer text is
       rendered by the host outside the iframe)
  When both chart and table channels are present the chart wins — deterministic,
  no double-render.

  No external origins: this file plus its two vendored bundles
  (./vendor/echarts.min.js, ./vendor/app-with-deps.js) form the entire widget.
  Both bundles are *inlined* into this HTML at serve time by
  sqllens.ui.load_widget_html() — MCP App hosts ``document.write`` the HTML
  into an about:blank-base iframe with no access to sibling files on the MCP
  server, so any relative <script src=…> or `import "./vendor/…"` would 404 and
  the widget would silently hang on "Waiting for results…".

  Renderer: ECharts SVG renderer (echarts.init(el, theme, {renderer:'svg'})).
  The SVG renderer needs no eval/Function and emits plain DOM, so it cannot
  trip a strict iframe CSP — chosen deliberately over the canvas renderer so
  no 'unsafe-eval' is ever required (see issue #138 CSP acceptance criterion).
-->
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Query results</title>
<script src="./vendor/echarts.min.js"></script>
<style>
  :root {
    color-scheme: light dark;
    --bg: var(--color-background-primary, transparent);
    --fg: var(--color-text-primary, #1a1a1a);
    --muted: var(--color-text-secondary, #6b7280);
    --line: var(--color-border-primary, #d1d5db);
    --row-alt: var(--color-background-secondary, rgba(127, 127, 127, 0.06));
    --accent: var(--color-background-info, #2563eb);
    --control-bg: var(--color-background-tertiary, rgba(127, 127, 127, 0.10));
  }
  /* Dark-mode fallbacks: only the `--color-*` design tokens the host pushes
     through getHostContext() can override these. Hosts that don't push tokens
     (MCP Inspector sends only `{theme}` with no styles object) leave the
     var() defaults in play — without these rules the light-mode #1a1a1a text
     renders black on a dark background. Precedence: explicit host theme
     wins over the OS preference, so the prefers-color-scheme rule excludes
     [data-theme="light"] (a host in light mode on a dark OS still renders
     light). data-theme="dark" stays as a separate rule so an explicit dark
     theme also wins on a light OS. */
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --fg: var(--color-text-primary, #e6e6e6);
      --muted: var(--color-text-secondary, #a1a1aa);
      --line: var(--color-border-primary, #3a3a40);
      --row-alt: var(--color-background-secondary, rgba(255, 255, 255, 0.04));
      --control-bg: var(--color-background-tertiary, rgba(255, 255, 255, 0.08));
    }
  }
  :root[data-theme="dark"] {
    --fg: var(--color-text-primary, #e6e6e6);
    --muted: var(--color-text-secondary, #a1a1aa);
    --line: var(--color-border-primary, #3a3a40);
    --row-alt: var(--color-background-secondary, rgba(255, 255, 255, 0.04));
    --control-bg: var(--color-background-tertiary, rgba(255, 255, 255, 0.08));
  }
  html, body { margin: 0; padding: 0; background: transparent; }
  body {
    color: var(--fg);
    font: 13px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    padding: 8px;
  }
  .bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
  .bar input, .bar button {
    font: inherit; color: var(--fg);
    background: var(--control-bg);
    border: 1px solid var(--line); border-radius: 6px; padding: 4px 8px;
  }
  .bar input { flex: 1 1 160px; min-width: 120px; }
  .bar button { cursor: pointer; }
  .bar button:hover { border-color: var(--accent); }
  .meta { color: var(--muted); font-size: 12px; }
  .wrap { overflow: auto; border: 1px solid var(--line); border-radius: 6px; }
  table { border-collapse: collapse; width: 100%; }
  th, td {
    text-align: left; padding: 5px 10px;
    border-bottom: 1px solid var(--line);
    white-space: nowrap;
  }
  th { position: sticky; top: 0; background: var(--control-bg); cursor: pointer; user-select: none; }
  th .ind { color: var(--muted); font-size: 11px; }
  tbody tr:nth-child(even) { background: var(--row-alt); }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .pager { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
  .pager button[disabled] { opacity: 0.4; cursor: default; }
  .empty { color: var(--muted); padding: 16px; }
  details.sql { margin-bottom: 8px; }
  details.sql summary {
    cursor: pointer; color: var(--muted); font-size: 12px;
    user-select: none; padding: 4px 0;
  }
  details.sql pre {
    margin: 4px 0 0; padding: 8px;
    background: var(--control-bg); border: 1px solid var(--line);
    border-radius: 6px; overflow: auto;
    font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    white-space: pre-wrap; word-break: break-word;
  }
  /* Chart mode: a definite chart height so the document sizes to its content.
     The App SDK's autoResize measures content height by briefly forcing
     documentElement to `max-content`, but that does NOT collapse a
     viewport-height (vh) value — vh resolves against the iframe viewport, not
     the ancestor — so a viewport-relative chart-host height would keep
     reporting the full iframe height and never shrink to fit. A definite
     height lets the measurement see the real content size; see issue #174. */
  .charthost { display: flex; flex-direction: column; }
  .charthost #chart { height: 360px; width: 100%; }
  .charthost .note { color: var(--muted); font-size: 12px; padding: 4px 2px 0; }
</style>
</head>
<body>
<div id="root"><div class="empty">Waiting for results…</div></div>

<script type="module">
import { App } from "./vendor/app-with-deps.js";

const PAGE_SIZE = 50;
const TABLE_META_KEY = "sqllens/table";
const QUERY_META_KEY = "sqllens/query";
const CHART_META_KEY = "sqllens/chart";

const state = {
  // shared
  mode: "empty", // "chart" | "table" | "empty"
  theme: "light",
  // table mode
  columns: [],
  rows: [],
  types: {},
  rowCount: 0,
  truncated: 0,
  sortCol: -1,
  sortDir: 1,
  filter: "",
  page: 0,
  sql: "",
  // chart mode
  spec: null,
};

let chart = null;
let resizeObserver = null;

// Four stable children. The table hosts (sqlHost, barHost, gridHost) and the
// chart host (chartHost) all stay in the DOM; ingest() populates the set that
// matches the active mode and empties the rest. render() owns gridHost only —
// clearing it on every filter/sort/page keystroke must not (a) destroy and
// collapse the user's expanded "Executed SQL" panel, NOR (b) replace the
// filter <input> mid-typing (which would steal focus on every keystroke).
const root = document.getElementById("root");
root.textContent = "";
const sqlHost = document.createElement("div");
const barHost = document.createElement("div");
const gridHost = document.createElement("div");
const chartHost = document.createElement("div");
chartHost.className = "charthost";
const _waiting = document.createElement("div");
_waiting.className = "empty";
_waiting.textContent = "Waiting for results…";
gridHost.appendChild(_waiting);
root.append(sqlHost, barHost, gridHost, chartHost);

// Persistent reference the bar exposes to render(): the meta span's text
// ("showing N of M") changes as the user filters/sorts/pages, but the
// containing input + CSV button DOM is stable so focus survives.
let _metaSpan = null;

function isNumeric(colIndex) {
  return state.types[state.columns[colIndex]] === "number";
}

function applyHostContext(ctx) {
  if (!ctx) return;
  const theme = ctx.theme === "dark" ? "dark" : "light";
  // data-theme drives the :root[data-theme="dark"] CSS rule. We set it
  // explicitly (rather than relying on prefers-color-scheme) so the host's
  // declared theme wins over the OS preference — e.g. a dark host on a
  // light-mode OS still renders dark.
  document.documentElement.dataset.theme = theme;
  document.documentElement.style.colorScheme = theme;
  const vars = ctx.styles && ctx.styles.variables;
  if (vars) {
    for (const [k, v] of Object.entries(vars)) {
      if (typeof v === "string") document.documentElement.style.setProperty(k, v);
    }
  }
  if (theme !== state.theme) {
    state.theme = theme;
    // ECharts cannot swap theme on a live instance — dispose and re-init so
    // there is no ghost chart from the previous theme. Only relevant while a
    // chart is on screen; in table mode there is nothing to rebuild.
    if (state.mode === "chart") rebuildChart();
  }
}

// ───────────────────────────── table mode ───────────────────────────────────

function filteredRows() {
  if (!state.filter) return state.rows;
  const needle = state.filter.toLowerCase();
  return state.rows.filter((r) =>
    r.some((cell) => String(cell).toLowerCase().includes(needle))
  );
}

function sortedRows(rows) {
  if (state.sortCol < 0) return rows;
  const c = state.sortCol;
  const numeric = isNumeric(c);
  const copy = rows.slice();
  copy.sort((a, b) => {
    const x = a[c], y = b[c];
    let cmp;
    if (numeric) {
      const nx = parseFloat(x), ny = parseFloat(y);
      const xn = Number.isNaN(nx), yn = Number.isNaN(ny);
      if (xn && yn) cmp = 0;
      else if (xn) cmp = 1;
      else if (yn) cmp = -1;
      else cmp = nx - ny;
    } else {
      cmp = String(x).localeCompare(String(y));
    }
    return cmp * state.sortDir;
  });
  return copy;
}

function csvEscape(v) {
  const s = String(v);
  return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}

function buildCsvText() {
  const rows = sortedRows(filteredRows());
  const lines = [state.columns.map(csvEscape).join(",")];
  for (const r of rows) lines.push(r.map(csvEscape).join(","));
  return lines.join("\r\n");
}

// Show a transient message in the meta span ("showing N of M") and restore
// the count after a couple of seconds. Used to give CSV-export feedback
// without destroying the table (showNotice() would clear gridHost).
function flashMeta(text) {
  if (!_metaSpan) return;
  _metaSpan.textContent = text;
  setTimeout(() => { if (_metaSpan) render(); }, 2500);
}

// Last-resort fallback: render the CSV inline in a textarea so the user can
// always read/copy it manually. Works in any sandbox because it requires no
// permissions and no host capability. The "Back to table" button restores
// the grid.
function showCsvOverlay(csvText) {
  gridHost.textContent = "";
  const wrap = document.createElement("div");
  wrap.className = "wrap";
  wrap.style.padding = "8px";
  const hint = document.createElement("div");
  hint.className = "meta";
  hint.style.marginBottom = "6px";
  hint.textContent =
    "Host blocked the file download and clipboard. Select all and copy:";
  const ta = document.createElement("textarea");
  ta.readOnly = true;
  ta.value = csvText;
  ta.style.width = "100%";
  ta.style.minHeight = "240px";
  ta.style.font = "12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
  ta.style.background = "var(--control-bg)";
  ta.style.color = "var(--fg)";
  ta.style.border = "1px solid var(--line)";
  ta.style.borderRadius = "6px";
  ta.style.padding = "6px";
  const done = document.createElement("button");
  done.textContent = "Back to table";
  done.style.marginTop = "8px";
  done.addEventListener("click", render);
  wrap.append(hint, ta, done);
  gridHost.appendChild(wrap);
  ta.focus();
  ta.select();
}

// Synchronous clipboard copy via a temporary <textarea>. The async
// navigator.clipboard.writeText needs `clipboard-write` permissions-policy
// that MCP Inspector's sandbox doesn't grant; document.execCommand("copy")
// is deprecated but doesn't need that grant and works inside sandboxed
// iframes that have `allow-same-origin`. Returns true on success.
function copyViaExecCommand(text) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.left = "-9999px";
  ta.style.top = "0";
  ta.setAttribute("readonly", "");
  document.body.appendChild(ta);
  let ok = false;
  try {
    ta.select();
    ta.setSelectionRange(0, ta.value.length);
    ok = document.execCommand("copy");
  } catch (err) {
    console.warn("execCommand('copy') failed:", err);
    ok = false;
  } finally {
    ta.remove();
  }
  return ok;
}

async function exportCsv() {
  // Tiered export. MCP App iframes are sandboxed without `allow-downloads`
  // and Inspector doesn't grant `clipboard-write` permissions-policy, so
  // both the obvious <a download> and the async clipboard API silently
  // no-op there. Cascade:
  //   1) ui/download-file — spec-compliant hosts (Claude Desktop).
  //   2) navigator.clipboard.writeText — modern, needs clipboard-write.
  //   3) document.execCommand("copy") — legacy, works without that grant.
  //   4) Inline textarea overlay — always works; user copies manually.
  const csvText = buildCsvText();
  const caps = (app.getHostCapabilities && app.getHostCapabilities()) || {};
  if (caps.downloadFile) {
    try {
      await app.downloadFile({
        contents: [
          {
            type: "resource",
            resource: {
              uri: "query_results.csv",
              mimeType: "text/csv",
              text: csvText,
            },
          },
        ],
      });
      flashMeta("downloaded ✓");
      return;
    } catch (err) {
      console.warn("ui/download-file failed:", err);
    }
  }
  try {
    await navigator.clipboard.writeText(csvText);
    flashMeta("copied to clipboard ✓");
    return;
  } catch (err) {
    console.warn("clipboard.writeText failed:", err);
  }
  if (copyViaExecCommand(csvText)) {
    flashMeta("copied to clipboard ✓");
    return;
  }
  showCsvOverlay(csvText);
}

function renderSqlSection() {
  // Collapsed by default — executed SQL is QA detail, not the primary answer.
  // Called once per result from ingestTable(), never from render().
  sqlHost.textContent = "";
  if (!state.sql) return;
  const details = document.createElement("details");
  details.className = "sql";
  const summary = document.createElement("summary");
  summary.textContent = "Executed SQL";
  const pre = document.createElement("pre");
  const code = document.createElement("code");
  code.textContent = state.sql;
  pre.appendChild(code);
  details.append(summary, pre);
  sqlHost.appendChild(details);
}

function renderBar() {
  // Painted once per result from ingestTable(); render() never touches barHost,
  // so the filter input keeps focus across keystrokes. The "showing N of M"
  // span is exposed to render() via _metaSpan so its text can update
  // without rebuilding the input.
  barHost.textContent = "";
  _metaSpan = null;
  if (!state.columns.length) return;
  const bar = document.createElement("div");
  bar.className = "bar";
  const search = document.createElement("input");
  search.type = "search";
  search.placeholder = "Filter rows…";
  search.value = state.filter;
  search.addEventListener("input", () => {
    state.filter = search.value;
    state.page = 0;
    render();
  });
  const csvBtn = document.createElement("button");
  csvBtn.textContent = "Export CSV";
  csvBtn.addEventListener("click", exportCsv);
  const meta = document.createElement("span");
  meta.className = "meta";
  bar.append(search, csvBtn, meta);
  barHost.appendChild(bar);
  _metaSpan = meta;
}

function render() {
  const matched = filteredRows();
  const sorted = sortedRows(matched);
  const pages = Math.max(1, Math.ceil(sorted.length / PAGE_SIZE));
  if (state.page >= pages) state.page = pages - 1;
  if (state.page < 0) state.page = 0;
  const start = state.page * PAGE_SIZE;
  const pageRows = sorted.slice(start, start + PAGE_SIZE);

  if (_metaSpan) {
    let msg = `showing ${matched.length} of ${state.rowCount}`;
    if (state.truncated > 0) msg += ` (${state.truncated} truncated)`;
    _metaSpan.textContent = msg;
  }

  gridHost.textContent = "";

  if (!state.columns.length) {
    const d = document.createElement("div");
    d.className = "empty";
    d.textContent = "No tabular result for this query.";
    gridHost.appendChild(d);
    return;
  }

  const wrap = document.createElement("div");
  wrap.className = "wrap";
  const table = document.createElement("table");
  const thead = document.createElement("thead");
  const htr = document.createElement("tr");
  state.columns.forEach((name, i) => {
    const th = document.createElement("th");
    th.textContent = name + " ";
    const ind = document.createElement("span");
    ind.className = "ind";
    ind.textContent = state.sortCol === i ? (state.sortDir === 1 ? "▲" : "▼") : "";
    th.appendChild(ind);
    th.addEventListener("click", () => {
      if (state.sortCol === i) state.sortDir = -state.sortDir;
      else { state.sortCol = i; state.sortDir = 1; }
      render();
    });
    htr.appendChild(th);
  });
  thead.appendChild(htr);
  table.appendChild(thead);

  const tbody = document.createElement("tbody");
  for (const r of pageRows) {
    const tr = document.createElement("tr");
    r.forEach((cell, i) => {
      const td = document.createElement("td");
      if (isNumeric(i)) td.className = "num";
      td.textContent = String(cell);
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
  wrap.appendChild(table);
  gridHost.appendChild(wrap);

  const pager = document.createElement("div");
  pager.className = "pager";
  const prev = document.createElement("button");
  prev.textContent = "‹ Prev";
  prev.disabled = state.page === 0;
  prev.addEventListener("click", () => { state.page--; render(); });
  const next = document.createElement("button");
  next.textContent = "Next ›";
  next.disabled = state.page >= pages - 1;
  next.addEventListener("click", () => { state.page++; render(); });
  const pos = document.createElement("span");
  pos.className = "meta";
  pos.textContent = `page ${state.page + 1} / ${pages}`;
  pager.append(prev, next, pos);
  gridHost.appendChild(pager);
}

function ingestTable(meta) {
  state.mode = "table";
  // Leaving any prior chart behind would keep a live ECharts instance and its
  // ResizeObserver running under a hidden host; dispose before painting table.
  disposeChart();
  chartHost.textContent = "";

  const queryInfo = meta[QUERY_META_KEY];
  state.sql =
    queryInfo && typeof queryInfo.sql === "string" ? queryInfo.sql : "";
  renderSqlSection();

  const payload = meta[TABLE_META_KEY];
  if (!payload || !Array.isArray(payload.columns)) {
    state.columns = [];
    renderBar();
    render();
    return;
  }
  state.columns = payload.columns;
  state.rows = Array.isArray(payload.rows) ? payload.rows : [];
  state.types = payload.column_types || {};
  state.rowCount = typeof payload.row_count === "number" ? payload.row_count : state.rows.length;
  state.truncated = typeof payload.truncated === "number" ? payload.truncated : 0;
  state.sortCol = -1;
  state.sortDir = 1;
  state.filter = "";
  state.page = 0;
  renderBar();
  render();
}

// ───────────────────────────── chart mode ───────────────────────────────────

function distinct(rows, key) {
  const seen = new Set();
  const out = [];
  for (const r of rows) {
    const v = r[key];
    const tag = String(v);
    if (!seen.has(tag)) {
      seen.add(tag);
      out.push(v);
    }
  }
  return out;
}

function buildEchartsOption(spec) {
  const rows = Array.isArray(spec.data) ? spec.data : [];
  const xf = spec.x && spec.x.field;
  const yf = spec.y && spec.y.field;
  const xLabel = (spec.x && spec.x.label) || xf;
  const yLabel = (spec.y && spec.y.label) || yf;
  const yAxisType = spec.y && spec.y.type === "log" ? "log" : "value";
  const title = spec.title ? { text: spec.title, left: "center" } : undefined;

  if (spec.chart_type === "pie") {
    return {
      title,
      tooltip: { trigger: "item" },
      legend: { type: "scroll", bottom: 0 },
      series: [
        {
          type: "pie",
          radius: "60%",
          data: rows.map((r) => ({ name: String(r[xf]), value: r[yf] })),
        },
      ],
    };
  }

  if (spec.chart_type === "heatmap") {
    const valueField = spec.series; // the z dimension (DSL: series == value field)
    const xCats = distinct(rows, xf).map(String);
    const yCats = distinct(rows, yf).map(String);
    let min = Infinity;
    let max = -Infinity;
    const data = rows.map((r) => {
      const v = Number(r[valueField]);
      if (Number.isFinite(v)) {
        if (v < min) min = v;
        if (v > max) max = v;
      }
      return [xCats.indexOf(String(r[xf])), yCats.indexOf(String(r[yf])), r[valueField]];
    });
    if (!Number.isFinite(min)) { min = 0; max = 1; }
    return {
      title,
      tooltip: { position: "top" },
      grid: { containLabel: true },
      xAxis: { type: "category", data: xCats, name: xLabel },
      yAxis: { type: "category", data: yCats, name: yLabel },
      visualMap: { min, max, calculable: true, orient: "horizontal", left: "center", bottom: 0 },
      series: [{ type: "heatmap", data, label: { show: false } }],
    };
  }

  if (spec.chart_type === "scatter") {
    const mk = (rs) => rs.map((r) => [r[xf], r[yf]]);
    let series;
    let legend;
    if (spec.series) {
      const groups = distinct(rows, spec.series).map(String);
      legend = { type: "scroll", bottom: 0, data: groups };
      series = groups.map((g) => ({
        name: g,
        type: "scatter",
        data: mk(rows.filter((r) => String(r[spec.series]) === g)),
      }));
    } else {
      series = [{ type: "scatter", data: mk(rows) }];
    }
    return {
      title,
      tooltip: { trigger: "item" },
      legend,
      grid: { containLabel: true },
      xAxis: { type: "value", name: xLabel },
      yAxis: { type: yAxisType, name: yLabel },
      series,
    };
  }

  // bar | line | area
  const isArea = spec.chart_type === "area";
  const baseType = spec.chart_type === "bar" ? "bar" : "line";
  const xType = spec.x && spec.x.type;
  const continuous = xType === "time" || xType === "value";

  // Continuous x (time/value): emit [x, y] tuples. Categorical x: align each
  // series's points to the shared category list, filling gaps with null.
  const pointsFor = (rs, cats) =>
    continuous
      ? rs.map((r) => [r[xf], r[yf]])
      : (() => {
          const byCat = new Map(rs.map((r) => [String(r[xf]), r[yf]]));
          return cats.map((c) => (byCat.has(c) ? byCat.get(c) : null));
        })();

  const makeSeries = (name, rs, cats) => ({
    name,
    type: baseType,
    smooth: baseType === "line",
    areaStyle: isArea ? {} : undefined,
    data: pointsFor(rs, cats),
  });

  const cats = continuous ? null : distinct(rows, xf).map(String);
  const xAxis = continuous
    ? { type: xType, name: xLabel }
    : { type: "category", data: cats, name: xLabel };

  let series;
  let legend;
  if (spec.series) {
    const groups = distinct(rows, spec.series).map(String);
    legend = { type: "scroll", bottom: 0, data: groups };
    series = groups.map((g) =>
      makeSeries(g, rows.filter((r) => String(r[spec.series]) === g), cats)
    );
  } else {
    series = [makeSeries(undefined, rows, cats)];
  }

  return {
    title,
    tooltip: { trigger: "axis" },
    legend,
    grid: { containLabel: true },
    xAxis,
    yAxis: { type: yAxisType, name: yLabel },
    series,
  };
}

function disposeChart() {
  if (resizeObserver) {
    resizeObserver.disconnect();
    resizeObserver = null;
  }
  if (chart) {
    chart.dispose();
    chart = null;
  }
}

function rebuildChart() {
  // Re-render from state.spec under the current theme. Used on first ingest
  // and on every theme change (ECharts has no live theme swap).
  disposeChart();
  chartHost.textContent = "";

  if (!state.spec || !Array.isArray(state.spec.data) || state.spec.data.length === 0) {
    showNotice("No chartable result for this query.");
    return;
  }

  const chartEl = document.createElement("div");
  chartEl.id = "chart";
  chartHost.appendChild(chartEl);

  const truncated = typeof state.spec.truncated === "number" ? state.spec.truncated : 0;
  if (truncated > 0) {
    const note = document.createElement("div");
    note.className = "note";
    const shown = state.spec.row_count != null ? state.spec.row_count : state.spec.data.length;
    note.textContent = `Rendering first ${shown} of ${shown + truncated} rows.`;
    chartHost.appendChild(note);
  }

  try {
    chart = echarts.init(
      chartEl,
      state.theme === "dark" ? "dark" : null,
      { renderer: "svg" }
    );
    chart.setOption(buildEchartsOption(state.spec));
  } catch (err) {
    showNotice("Could not render chart: " + (err && err.message ? err.message : err));
    return;
  }

  resizeObserver = new ResizeObserver(() => {
    if (chart) chart.resize();
  });
  resizeObserver.observe(chartEl);
}

function ingestChart(payload) {
  state.mode = "chart";
  // Clear any prior table DOM so a stale grid/SQL panel can't show under the
  // chart host (they share the same iframe).
  sqlHost.textContent = "";
  barHost.textContent = "";
  gridHost.textContent = "";
  _metaSpan = null;
  state.spec = payload;
  rebuildChart();
}

// ───────────────────────────── dispatch ─────────────────────────────────────

function ingest(result) {
  const meta = (result && result._meta) || {};
  const chartPayload = meta[CHART_META_KEY];
  // Chart wins, but only when it is actually renderable; an empty/malformed
  // chart payload falls through to the table (or empty-state) so a present
  // table is never hidden behind a blank chart.
  if (
    chartPayload &&
    Array.isArray(chartPayload.data) &&
    chartPayload.data.length > 0
  ) {
    ingestChart(chartPayload);
    return;
  }
  ingestTable(meta);
}

function showNotice(text) {
  // Render the notice in whichever host owns the active mode so it replaces
  // the partial render rather than stacking beneath it.
  const host = state.mode === "chart" ? chartHost : gridHost;
  disposeChart();
  host.textContent = "";
  const d = document.createElement("div");
  d.className = "empty";
  d.textContent = text;
  host.appendChild(d);
}

// Host iframe auto-fit (issue #174). MCP App hosts render this widget in a
// sandboxed cross-origin iframe and can't read the document to size the frame,
// so the page must report its own size. The App SDK already does this: with
// `autoResize` enabled it observes the document and emits the protocol's
// `ui/notifications/size-changed` ({width, height}) with the true content
// height (it measures by briefly forcing documentElement to `max-content`).
// We pass it explicitly rather than leaning on the SDK default so an upstream
// default flip can't silently disable auto-fit. The only widget-side
// requirement is that the document be content-sized — hence the chart host's
// definite height above (a viewport-height value would defeat the measurement).
const app = new App(
  { name: "sqllens-query-results", version: "1.0.0" },
  {},
  { autoResize: true }
);
app.ontoolresult = (params) => {
  // Without this boundary a malformed payload throws into the SDK's message
  // dispatcher and the widget freezes on "Waiting for results…" with no
  // signal that data arrived but failed to render.
  try {
    ingest(params);
  } catch (err) {
    showNotice("Could not render results: " + (err && err.message ? err.message : err));
  }
};
// Theming is non-fatal and must never throw into the SDK dispatcher (which
// would wedge the message loop) nor be misreported as a connection failure.
function applyHostContextSafe() {
  try {
    applyHostContext(app.getHostContext());
    if (chart) chart.resize();
  } catch (err) {
    console.warn("host theming failed (non-fatal):", err);
  }
}

app.onhostcontextchanged = applyHostContextSafe;

app.connect()
  .then(applyHostContextSafe)
  .catch((err) => {
    showNotice("Failed to connect to host: " + (err && err.message ? err.message : err));
  });
</script>
</body>
</html>
