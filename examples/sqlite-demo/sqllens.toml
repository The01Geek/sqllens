# SQL Lens demo config — points at the bundled Chinook SQLite database.
# Set SQLLENS_LLM__API_KEY in your environment, then:
#
#     sqllens serve -c examples/sqlite-demo/sqllens.toml
#
# The server speaks MCP on stdio. Point your MCP client (Cursor, Claude Desktop,
# MCP Inspector, etc.) at the resulting process.

[database]
url = "sqlite:///./examples/sqlite-demo/chinook.db"
name = "chinook"
read_only = true

[llm]
provider = "anthropic"
model = "claude-sonnet-4-6"
# api_key intentionally omitted — set SQLLENS_LLM__API_KEY in your shell.

[memory]
persist_dir = "./examples/sqlite-demo/chroma"
collection = "chinook"

[auth]
mode = "none"

[agent]
show_details = false   # do not expose the generated SQL to MCP clients

[server]
transport = "stdio"
